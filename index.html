<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Pre-React language: read saved choice so the loader matches Khmer/English.
      // App will re-apply language after hydration.
      (function () {
        var lang = "en";
        try {
          lang = window.localStorage.getItem("e_menu_drink:lang:v1") || "en";
        } catch (e) {
          // ignore
        }
        lang = lang === "km" ? "km" : "en";
        window.__initialLoaderLang = lang;
        try {
          document.documentElement.lang = lang;
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <style>
      /* Minimal pre-React loader (works even on slow internet) */
      #app-loader {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Noto Sans Khmer", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      #app-loader .card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(17, 24, 39, 0.12);
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        padding: 22px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      #app-loader .spinner {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid rgba(17, 24, 39, 0.2);
        border-top-color: rgba(17, 24, 39, 0.85);
        animation: spin 0.9s linear infinite;
        flex: none;
      }
      #app-loader .title {
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.2px;
      }
      #app-loader .sub {
        margin-top: 2px;
        font-weight: 600;
        font-size: 12px;
        color: rgba(17, 24, 39, 0.7);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <title>e-menu-drink</title>
  </head>
  <body>
    <div id="root">
      <div id="app-loader" aria-label="Loading">
        <div class="card">
          <div class="spinner" aria-hidden="true"></div>
          <div>
            <div class="title" id="loader-title">Loading…</div>
            <div class="sub" id="loader-sub">If your internet is slow, please wait.</div>
            <script>
              (function () {
                var STR = {
                  en: { title: "Loading…", sub: "If your internet is slow, please wait." },
                  km: { title: "កំពុងផ្ទុក…", sub: "បើអ៊ីនធឺណិតយឺត សូមរង់ចាំ។" },
                };

                function applyLang(next) {
                  var lang = next === "km" ? "km" : "en";
                  var t = document.getElementById("loader-title");
                  var s = document.getElementById("loader-sub");
                  if (t) t.textContent = STR[lang].title;
                  if (s) s.textContent = STR[lang].sub;
                }

                applyLang(window.__initialLoaderLang || "en");
              })();
            </script>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
